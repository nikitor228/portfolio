<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savelev Nikita — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=Saira:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Saira', sans-serif;
      min-height: 100vh;
      padding: 46px 180px 100px 180px;
    }

    /* ───── SKIP LINK ───── */

    .skip-link {
      position: absolute;
      top: -100px;
      left: 180px;
      padding: 8px 16px;
      background: #000;
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-decoration: none;
      z-index: 200;
      transition: top 200ms ease;
    }

    .skip-link:focus { top: 12px; }

    /* ───── FOCUS STATES ───── */

    .nav-item:focus-visible {
      outline: 1.5px solid #000;
      outline-offset: 4px;
      border-radius: 1px;
    }

    .lb-btn:focus-visible,
    .lb-close:focus-visible {
      outline: 1.5px solid #fff;
      outline-offset: 4px;
      border-radius: 2px;
    }

    /* ───── HEADER ───── */

    .site-header {
      display: flex;
      align-items: center;
      margin-bottom: 100px;
    }

    .site-name {
      font-family: 'Crimson Text', serif;
      font-weight: 600;
      font-size: 60px;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .header-rule {
      flex: 1;
      height: 5px;
      background: #000;
      margin: 8px 36px 0;
      min-width: 32px;
    }

    .site-title {
      font-family: 'Crimson Text', serif;
      font-weight: 600;
      font-size: 60px;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ───── LAYOUT ───── */

    .content-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0 80px;
      align-items: start;
    }

    /* ───── SIDEBAR ───── */

    /* sticky on the aside itself — required for CSS grid sticky to work */
    .sticky-aside {
      position: sticky;
      top: 46px;
      align-self: start;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .nav-item {
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1;
      opacity: 0.4;
      cursor: pointer;
      transition: opacity 200ms ease;
      user-select: none;
      padding: 4px 0; /* increases click/touch target */
    }

    .nav-item + .nav-item  { margin-top: 16px; }
    .nav-item.nav-all      { margin-bottom: 48px; letter-spacing: 0.18em; }
    .nav-item.nav-all + .nav-item { margin-top: 0; }

    .nav-item:hover        { opacity: 0.65; }
    .nav-item.active       { opacity: 1; font-weight: 400; }
    .nav-item.active:hover { opacity: 1; }

    /* ───── PHOTO GRID ───── */

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-flow: dense;
      gap: 20px;
      max-width: 800px;
      margin-left: auto;
    }

    .photo-item {
      overflow: hidden;
      cursor: pointer;
      display: block;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 400ms ease;
    }

    .photo-item img.loaded { opacity: 1; }

    .photo-portrait  { aspect-ratio: 2 / 3; }
    .photo-landscape { grid-column: 1 / -1; aspect-ratio: 3 / 2; }

    /* ───── SKELETON ───── */

    .skeleton {
      background: #f0f0f0;
      background-image: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .grid-empty {
      grid-column: 1 / -1;
      padding: 60px 0;
      font-size: 16px;
      opacity: 0.4;
    }

    /* ───── LIGHTBOX ───── */

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lb-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
      transition: opacity 300ms ease;
    }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 16px;
      color: #fff;
      opacity: 0.5;
      transition: opacity 180ms ease;
      /* min 44x44 touch target */
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-btn:hover { opacity: 1; }
    .lb-prev      { left: 16px; }
    .lb-next      { right: 16px; }
    .lb-btn svg   { width: 36px; height: 36px; display: block; }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #fff;
      opacity: 0.5;
      transition: opacity 180ms ease;
      /* min 44x44 touch target */
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-close:hover { opacity: 1; }
    .lb-close svg   { width: 28px; height: 28px; display: block; }

    .lb-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 13px;
      opacity: 0.4;
      letter-spacing: 0.08em;
    }

    /* ───── REDUCED MOTION ───── */

    @media (prefers-reduced-motion: reduce) {
      .photo-item img, .lightbox, .lb-img { transition: none; }
      .skeleton { animation: none; }
    }

    /* ───── RESPONSIVE ───── */

    @media (max-width: 1024px) {
      .site-name, .site-title { font-size: 44px; }
      .content-layout { grid-template-columns: 160px 1fr; gap: 0 48px; }
    }

    @media (max-width: 768px) {
      body { padding: 32px 24px 80px; }

      .site-header { flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 48px; }
      .header-rule { display: none; }
      .site-name   { font-size: 40px; }
      .site-title  { font-size: 28px; }

      .content-layout { grid-template-columns: 1fr; }
      .sticky-aside { position: static; margin-bottom: 36px; }
      .nav-list    { flex-direction: row; flex-wrap: wrap; gap: 12px 24px; }
      .nav-item.nav-all { margin-bottom: 0; width: 100%; }
      .nav-item + .nav-item { margin-top: 0; }

      .lb-btn { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── SKIP LINK ── -->
  <a class="skip-link" href="#photo-grid">Skip to photos</a>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <span class="site-name">Savelev Nikita</span>
    <span class="header-rule" aria-hidden="true"></span>
    <span class="site-title">Street &amp; Travel Photography</span>
  </header>

  <!-- ── CONTENT ── -->
  <div class="content-layout">

    <aside class="sticky-aside">
      <nav aria-label="Photo collections">
        <ul class="nav-list" id="nav-list">
          <li class="nav-item nav-all active" data-filter="all"       tabindex="0">Full Collection</li>
          <li class="nav-item"               data-filter="armenia"   tabindex="0">Armenia</li>
          <li class="nav-item"               data-filter="georgia"   tabindex="0">Georgia</li>
          <li class="nav-item"               data-filter="indonesia" tabindex="0">Indonesia</li>
          <li class="nav-item"               data-filter="russia"    tabindex="0">Russia</li>
          <li class="nav-item"               data-filter="thailand"  tabindex="0">Thailand</li>
          <li class="nav-item"               data-filter="turkey"    tabindex="0">Turkey</li>
          <li class="nav-item"               data-filter="vietnam"   tabindex="0">Vietnam</li>
        </ul>
      </nav>
    </aside>

    <main>
      <div class="photo-grid" id="photo-grid">
        <!-- skeletons shown while loading -->
      </div>
    </main>

  </div>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lb-close" id="lb-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>

    <img class="lb-img" id="lb-img" src="" alt="">

    <button class="lb-btn lb-prev" id="lb-prev" aria-label="Previous photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <button class="lb-btn lb-next" id="lb-next" aria-label="Next photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>

    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <script>
    const CLOUD   = 'dxvpalhqh';
    const thumb   = id => `https://res.cloudinary.com/${CLOUD}/image/upload/w_1200,q_auto,f_auto/${id}`;
    const fullRes = id => `https://res.cloudinary.com/${CLOUD}/image/upload/q_auto/${id}`;

    let allPhotos     = [];
    let visiblePhotos = [];
    let lbIndex       = 0;

    // ── SKELETONS ────────────────────────────────────────────────────────────

    function showSkeletons() {
      const grid = document.getElementById('photo-grid');
      // 8 placeholder tiles: portrait, portrait, landscape, portrait, portrait, landscape, portrait, portrait
      const pattern = ['portrait','portrait','landscape','portrait','portrait','landscape','portrait','portrait'];
      grid.innerHTML = pattern.map(o =>
        `<div class="photo-${o} skeleton"></div>`
      ).join('');
    }

    // ── LOAD ─────────────────────────────────────────────────────────────────

    showSkeletons();

    fetch('photos.json')
      .then(r => r.json())
      .then(data => {
        allPhotos = data;
        renderGrid(allPhotos);
      })
      .catch(() => {
        document.getElementById('photo-grid').innerHTML =
          '<p class="grid-empty">photos.json not found — run <code>node scripts/generate-manifest.js</code> first, then open via a local server.</p>';
      });

    // ── GRID ─────────────────────────────────────────────────────────────────

    function renderGrid(photos) {
      const grid = document.getElementById('photo-grid');
      visiblePhotos = photos;

      if (!photos.length) {
        grid.innerHTML = '<p class="grid-empty">No photos in this collection.</p>';
        return;
      }

      grid.innerHTML = '';
      photos.forEach((photo, i) => {
        const div = document.createElement('div');
        div.className = `photo-item photo-${photo.orientation}`;

        const img = document.createElement('img');
        img.src     = thumb(photo.id);
        img.alt     = photo.alt;
        // first 6 visible images load eagerly for faster LCP
        img.loading = i < 6 ? 'eager' : 'lazy';

        // fade in when loaded
        img.onload = () => img.classList.add('loaded');
        // if already cached, onload won't fire
        if (img.complete) img.classList.add('loaded');

        div.appendChild(img);
        div.addEventListener('click', () => openLightbox(i));
        grid.appendChild(div);
      });
    }

    // ── NAV ──────────────────────────────────────────────────────────────────

    document.getElementById('nav-list').addEventListener('click', e => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const filter = item.dataset.filter;
      renderGrid(filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter));
    });

    document.getElementById('nav-list').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.target.click(); }
    });

    // ── LIGHTBOX ─────────────────────────────────────────────────────────────

    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');

    function openLightbox(index) {
      lbIndex = index;
      showPhoto(index);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('lb-close').focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPhoto(index) {
      const photo = visiblePhotos[index];
      lbImg.alt = photo.alt;

      // show thumb immediately
      lbImg.style.opacity = '1';
      lbImg.src = thumb(photo.id);

      // load full-res, fade in when ready
      const hi = new Image();
      hi.onload = () => {
        lbImg.style.opacity = '0';
        setTimeout(() => {
          lbImg.src = hi.src;
          lbImg.style.opacity = '1';
        }, 150);
      };
      hi.src = fullRes(photo.id);

      lbCounter.textContent = `${index + 1} / ${visiblePhotos.length}`;
    }

    function prevPhoto() {
      lbIndex = (lbIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
      showPhoto(lbIndex);
    }

    function nextPhoto() {
      lbIndex = (lbIndex + 1) % visiblePhotos.length;
      showPhoto(lbIndex);
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', prevPhoto);
    document.getElementById('lb-next').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    });

    // swipe
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
    });
  </script>

</body>
</html>
