<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Order — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 32px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    h1 { font-size: 18px; font-weight: 600; }

    select {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

    .btn-save {
      margin-left: auto;
      padding: 10px 24px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms;
    }

    .btn-save:hover { background: #333; }

    .hint {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .tile {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      cursor: grab;
      border: 2px solid transparent;
      transition: border-color 150ms, box-shadow 150ms;
      user-select: none;
    }

    .tile:active { cursor: grabbing; }
    .tile.dragging { opacity: 0.4; border-color: #999; }
    .tile.drag-over { border-color: #111; box-shadow: 0 0 0 2px #111; }

    .tile img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .tile-label {
      padding: 6px 8px;
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading { color: #888; font-size: 15px; padding: 40px 0; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Photo Order</h1>
    <select id="filter">
      <option value="all">All</option>
      <option value="armenia">Armenia</option>
      <option value="georgia">Georgia</option>
      <option value="indonesia">Indonesia</option>
      <option value="russia">Russia</option>
      <option value="thailand">Thailand</option>
      <option value="turkey">Turkey</option>
      <option value="vietnam">Vietnam</option>
    </select>
    <button class="btn-save" id="btn-save">Save photos.json</button>
  </div>

  <p class="hint">Drag photos to reorder. Changes apply to the selected category. Save downloads a new photos.json — replace the old one.</p>

  <div class="grid" id="grid">
    <p class="loading">Loading…</p>
  </div>

  <script>
    const CLOUD = 'dxvpalhqh';
    const sq    = id => `https://res.cloudinary.com/${CLOUD}/image/upload/w_300,h_300,c_fill,q_auto,f_auto/${id}`;

    let allPhotos = [];
    let current   = [];
    let dragSrc   = null;

    fetch('photos.json')
      .then(r => r.json())
      .then(data => { allPhotos = data; render(); });

    document.getElementById('filter').addEventListener('change', render);

    function render() {
      const filter = document.getElementById('filter').value;
      current = filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      current.forEach((photo, i) => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.draggable = true;
        tile.dataset.index = i;

        tile.innerHTML = `
          <img src="${sq(photo.id)}" alt="${photo.alt}" loading="lazy">
          <div class="tile-label">${photo.id.split('/').pop()}</div>
        `;

        tile.addEventListener('dragstart', onDragStart);
        tile.addEventListener('dragover',  onDragOver);
        tile.addEventListener('dragleave', onDragLeave);
        tile.addEventListener('drop',      onDrop);
        tile.addEventListener('dragend',   onDragEnd);

        grid.appendChild(tile);
      });
    }

    // ── DRAG & DROP ──────────────────────────────────────────────────────────

    function onDragStart(e) {
      dragSrc = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (this !== dragSrc) this.classList.add('drag-over');
    }

    function onDragLeave() {
      this.classList.remove('drag-over');
    }

    function onDrop(e) {
      e.preventDefault();
      if (this === dragSrc) return;

      const fromIdx = parseInt(dragSrc.dataset.index);
      const toIdx   = parseInt(this.dataset.index);

      // reorder within the current filtered view
      const moved = current.splice(fromIdx, 1)[0];
      current.splice(toIdx, 0, moved);

      // merge back into allPhotos
      const filter = document.getElementById('filter').value;
      if (filter === 'all') {
        allPhotos = [...current];
      } else {
        // replace the relevant slice in allPhotos
        let ci = 0;
        allPhotos = allPhotos.map(p => p.category === filter ? current[ci++] : p);
      }

      render();
    }

    function onDragEnd() {
      document.querySelectorAll('.tile').forEach(t => {
        t.classList.remove('dragging', 'drag-over');
      });
    }

    // ── SAVE ─────────────────────────────────────────────────────────────────

    document.getElementById('btn-save').addEventListener('click', () => {
      const json = JSON.stringify(allPhotos, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = 'photos.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>

</body>
</html>
